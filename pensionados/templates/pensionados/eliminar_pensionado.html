<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Eliminar Pensionado</title>
  <script src="https://cdn.tailwindcss.com "></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">

  <!-- Header -->
  <header class="bg-white shadow-sm">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center space-x-2">
        <svg class="w-8 h-8 text-blue-600" viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.826c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 0 009 10.172V5L8 4z" />
        </svg>
        <h1 class="text-xl font-semibold">CFE - Sistema de Pensionados</h1>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="flex-grow container mx-auto p-6">
    <section class="bg-white p-6 rounded-lg shadow-md max-w-md mx-auto">
      <h2 class="text-2xl font-bold text-red-600 mb-4 text-center">¿Eliminar Registro?</h2>
      <p class="mb-6 text-center">
        ¿Estás seguro de que deseas eliminar a <strong>{{ pensionado.nombre }}</strong>, con número de acreedor <strong>{{ pensionado.acreedor }}</strong>?
      </p>

      <div class="flex justify-center space-x-4 mt-6">
        <a href="{% url 'pensiones' %}" 
           class="px-4 py-2 bg-green-600 text-white rounded-md hover:bg-green-700">
          Cancelar
        </a>

        <form method="post" action="">
          {% csrf_token %}
          <button type="submit" class="px-4 py-2 bg-red-600 text-white rounded-md hover:bg-red-700">
            Sí, Eliminar
          </button>
        </form>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="bg-white mt-auto border-t border-gray-200">
    <div class="max-w-7xl mx-auto px-6 py-4 text-center text-sm text-gray-500">
      &copy; {{ today.year }} Comisión Federal de Electricidad. Todos los derechos reservados.
    </div>
  </footer>

</body>
</html>
